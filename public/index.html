<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />

  <!-- Primary SEO -->
  <meta name="description"
    content="Cheapside is your go-to online store for affordable, high-quality products in Ghana. Shop fashion, accessories, gadgets, and more at unbeatable prices." />
  <meta name="keywords"
    content="Cheapside, cheap online store Ghana, affordable products, quality items, fashion, accessories, gadgets, bags, perfumes, online shopping Ghana" />
  <meta name="author" content="Cheapside" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph (Social Media) -->
  <meta property="og:title" content="Cheapside - Affordable & Quality Products Online" />
  <meta property="og:description"
    content="Shop a wide range of affordable and quality products on Cheapside. From fashion to gadgets and accessories, we've got you covered." />
  <meta property="og:image" content="%PUBLIC_URL%/image-removebg-preview (13).png" />
  <meta property="og:url" content="https://www.cheapside.shop" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Cheapside" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Cheapside - Affordable & Quality Products Online" />
  <meta name="twitter:description"
    content="Discover affordable, high-quality products at Cheapside. Shop fashion, gadgets, accessories, and more today!" />
  <meta name="twitter:image" content="%PUBLIC_URL%/image-removebg-preview (13).png" />

  <!-- Canonical -->
  <link rel="canonical" href="https://www.cheapside.shop" />

  <!-- Icons -->
  <link rel="icon" href="%PUBLIC_URL%/image-removebg-preview (13).png" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/image-removebg-preview (13).png" />

  <!-- Manifest -->
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <!-- Performance -->
  <link rel="preconnect" href="https://firestore.googleapis.com" />
  <link rel="preconnect" href="https://api.paystack.co" />
  <link rel="preload" href="%PUBLIC_URL%/image-removebg-preview (13).png" as="image" />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "name": "Cheapside",
        "url": "https://www.cheapside.shop",
        "logo": "%PUBLIC_URL%/image-removebg-preview (13).png",
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+233549856098",
          "email": "chideraeustace99@gmail.com",
          "contactType": "Customer Service",
          "areaServed": "GH"
        },
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Kumasi",
          "addressCountry": "GH"
        },
        "sameAs": [
          "https://www.instagram.com/cheapside",
          "https://www.facebook.com/cheapside",
          "https://www.twitter.com/cheapside"
        ]
      },
      {
        "@type": "WebSite",
        "name": "Cheapside",
        "url": "https://www.cheapside.shop",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://www.cheapside.shop/?search={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    ]
  }
  </script>

  <title>Cheapside - Affordable & Quality Products Online</title>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
</body>
